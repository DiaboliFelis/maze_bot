AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  Exclude:
    - 'spec/**/*'
    - 'vendor/**/*'
    - 'bin/**/*'

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 25

Metrics/AbcSize:
  Max: 25

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 10

Layout/LineLength:
  Max: 120

Style/FrozenStringLiteralComment:
  Enabled: false